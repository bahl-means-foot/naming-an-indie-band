<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원형 텍스트</title>

  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle-text {
      width: 25vmin;
      height: 25vmin;
      overflow: visible;
    }

    text {
      fill: red;
      font-family: "Batang", "Gungsuh", "Times New Roman", serif;
      font-size: 50px;
      font-weight: 500;
      letter-spacing: 10px;
    }
  </style>
</head>

<body>
  <svg class="circle-text" viewBox="0 0 200 200">
    <defs>
      <path
        id="circlePath"
        d="
          M 100, 100
          m 0, -70
          a 70,70 0 1,1 0,140
          a 70,70 0 1,1 0,-140
        "
      />
    </defs>

    <text>
      <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
        우리를 밟으면 사랑에 빠지리......
      </textPath>
    </text>
  </svg>
</body>
</html>
